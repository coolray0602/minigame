<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>羊了個羊 · 动态加载关卡 | 七卡槽完美适配</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #1b5e2a 0%, #0a3b1a 100%);
            font-family: 'Segoe UI', 'Poppins', 'Noto Sans TC', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: manipulation;
            padding: 12px;
        }

        /* 游戏主容器 - 弹性宽度确保七卡槽完整显示 */
        .game-container {
            width: 100%;
            max-width: 550px;
            margin: 0 auto;
            background: rgba(255,248,205,0.88);
            border-radius: 64px 64px 56px 56px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5), inset 0 1px 4px rgba(255,255,200,0.8);
            backdrop-filter: blur(3px);
            padding: 18px 12px 24px;
            transition: all 0.2s;
        }

        /* 顶部状态栏 */
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            background: #fdf8e7;
            padding: 10px 18px;
            border-radius: 60px;
            margin-bottom: 20px;
            box-shadow: inset 0 1px 4px #0001, 0 6px 12px rgba(0,0,0,0.2);
        }

        .score-box, .remaining-box {
            background: #2c2b28;
            padding: 6px 18px;
            border-radius: 40px;
            color: #ffeaac;
            font-weight: bold;
            font-size: 1.3rem;
            text-shadow: 0 1px 0 #5f3f00;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .score-box span, .remaining-box span {
            font-size: 0.7rem;
            color: #ddb76e;
            margin-right: 6px;
        }

        /* 卡槽区 - 使用 flex 自适应保证 7 张同时完整显示 */
        .slot-area {
            background: #e7dbb6;
            border-radius: 48px;
            padding: 12px 8px;
            margin-bottom: 20px;
            box-shadow: inset 0 0 0 3px #fff9e8, inset 0 0 0 6px #b9975a, 0 8px 18px black;
        }

        .slot-header {
            text-align: center;
            margin-bottom: 10px;
        }
        .slot-title {
            font-size: 0.7rem;
            font-weight: bold;
            color: #7a5610;
            background: #fffaec;
            display: inline-block;
            padding: 4px 18px;
            border-radius: 30px;
        }

        /* 卡槽容器: 使用 flex + 自动缩小保证 7 个可见，不换行 */
        .slots {
            display: flex;
            flex-direction: row;
            justify-content: center;
            gap: 8px;
            flex-wrap: nowrap;
            overflow-x: auto;
            padding: 8px 4px;
            min-height: 95px;
            scrollbar-width: thin;
        }

        /* 每个槽位卡片 - 使用百分比宽度 + 固定比例 */
        .slot-card {
            flex: 0 0 auto;
            width: 70px;
            height: 85px;
            background: #fef1ca;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.4rem;
            font-weight: bold;
            box-shadow: 0 6px 0 #aa7c3c;
            transition: all 0.1s ease;
            background: #fff3df;
            border: 1px solid #ecc48b;
        }

        .slot-card.warning {
            background: #ffb4a2;
            box-shadow: 0 0 0 2px #ff4444;
            transform: scale(0.98);
        }

        /* 堆叠舞台 - 立体错位 */
        .stack-stage {
            background: #ccaa75;
            border-radius: 48px;
            padding: 20px 12px;
            margin: 12px 0;
            box-shadow: inset 0 0 0 3px #fef0cf, inset 0 0 0 6px #b47c44, 0 8px 14px black;
            min-height: 460px;
            position: relative;
        }

        .cards-stack {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 420px;
        }

        /* 堆叠卡片样式 */
        .stack-card {
            position: absolute;
            width: 70px;
            height: 70px;
            background: #fff7e8;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            box-shadow: 0 6px 0 #a86f2e, 0 3px 10px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: 0.05s linear;
            transform-origin: center;
            border: 1px solid #fce6b4;
            z-index: 10;
        }

        .stack-card:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #a86f2e;
        }

        .stack-card.disabled-card {
            filter: brightness(0.75);
            cursor: default;
            pointer-events: none;
        }

        .control-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 16px;
        }

        button {
            background: #ffdd99;
            border: none;
            font-size: 1rem;
            font-weight: bold;
            padding: 8px 24px;
            border-radius: 60px;
            color: #4f2d0a;
            box-shadow: 0 4px 0 #b16224;
            transition: 0.07s linear;
            cursor: pointer;
            font-family: inherit;
        }

        button:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #b16224;
        }

        .message-area {
            text-align: center;
            margin-top: 16px;
            font-size: 0.8rem;
            font-weight: bold;
            background: #2b2b1faa;
            backdrop-filter: blur(4px);
            border-radius: 40px;
            padding: 8px;
            color: #ffefb9;
        }

        /* 手机窄屏适配：保证七卡槽同时完整显示 */
        @media (max-width: 550px) {
            .slot-card {
                width: clamp(52px, 12vw, 68px);
                height: clamp(65px, 15vw, 82px);
                font-size: clamp(1.5rem, 6vw, 2.2rem);
            }
            .slots {
                gap: 6px;
            }
            .stack-card {
                width: clamp(55px, 13vw, 70px);
                height: clamp(55px, 13vw, 70px);
                font-size: clamp(1.5rem, 5vw, 2rem);
            }
            .score-box, .remaining-box {
                padding: 4px 12px;
                font-size: 1rem;
            }
        }

        @media (max-width: 440px) {
            .slot-card {
                width: 52px;
                height: 65px;
                font-size: 1.6rem;
            }
            .stack-card {
                width: 52px;
                height: 52px;
                font-size: 1.5rem;
            }
            .game-container {
                padding: 12px 8px 20px;
            }
        }

        .loading-overlay {
            text-align: center;
            padding: 40px;
            background: #fdf0cf;
            border-radius: 48px;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="game-container" id="gameContainer">
    <div class="game-header">
        <div class="score-box"><span>🐏 积分</span> <span id="scoreValue">0</span></div>
        <div class="remaining-box"><span>📦 剩余</span> <span id="remainingCount">0</span></div>
    </div>

    <div class="slot-area">
        <div class="slot-header"><span class="slot-title">📥 卡槽 (最多7张)</span></div>
        <div class="slots" id="slotContainer"></div>
    </div>

    <div class="stack-stage">
        <div class="cards-stack" id="cardsStack"></div>
    </div>

    <div class="control-bar">
        <button id="resetBtn">🔄 重来</button>
        <button id="shuffleBtn">♻️ 洗牌</button>
    </div>
    <div class="message-area" id="gameMessage">📂 正在加载关卡配置 level.json ...</div>
</div>

<script>
    // --------------------------------------------------------------
    // 羊了个羊 · 游戏主体
    // 功能: 读取同目录下 JSON 关卡文件 (默认为 "level.json")
    // 根据文件中 cards 位置、图层信息生成堆叠，并随机分配 3 的倍数图标池
    // 七卡槽完整适配所有屏幕宽度，确保 7 张同时可见
    // 只有未被上层卡片压住的顶层卡片才可点击
    // --------------------------------------------------------------
    
    // ========== 可配置项：请在此填入您的关卡文件名 ==========
    const LEVEL_FILE_NAME = "level.json";   // 同目录下的关卡配置文件
    
    // 全局游戏状态
    let gameActive = true;
    let score = 0;
    let slotCards = [];            // 槽位图标数组
    let stackCards = [];           // 堆叠卡片对象数组 { id, icon, x, y, layer, width, height, topMost, removed }
    let nextCardId = 1;
    let currentLevelData = null;    // 存储原始关卡配置
    let iconPool = [];              // 随机图标池 (数量 = totalCards, 每个图标出现次数为3的倍数)
    
    // 图标库 (羊了个羊风格)
    const ICON_LIBRARY = ['🌿', '🍂', '🔥', '💧', '⭐', '❤️', '🍎', '🐑', '🌸', '🌻', '🍀', '🪶', '🧸', '🎈', '🍁', '🌟', '🌀', '🎵'];
    
    // DOM 元素
    const cardsStackDiv = document.getElementById('cardsStack');
    const slotContainer = document.getElementById('slotContainer');
    const scoreSpan = document.getElementById('scoreValue');
    const remainingSpan = document.getElementById('remainingCount');
    const resetBtn = document.getElementById('resetBtn');
    const shuffleBtn = document.getElementById('shuffleBtn');
    const gameMessageDiv = document.getElementById('gameMessage');
    
    // ---------- 辅助函数 ----------
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }
    
    // 根据卡片总数生成图标池 (每个图标出现次数为3的倍数，总数可被3整除)
    function generateIconPool(totalCards) {
        if (totalCards % 3 !== 0) {
            console.warn("卡片总数不是3的倍数，强制调整");
            totalCards = Math.ceil(totalCards / 3) * 3;
        }
        let pool = [];
        let iconIdx = 0;
        while (pool.length < totalCards) {
            const icon = ICON_LIBRARY[iconIdx % ICON_LIBRARY.length];
            // 每组添加3张，保证3的倍数
            for (let i = 0; i < 3 && pool.length < totalCards; i++) {
                pool.push(icon);
            }
            iconIdx++;
        }
        // 如果长度超出，裁剪
        if (pool.length > totalCards) pool = pool.slice(0, totalCards);
        // 彻底打乱顺序
        return shuffleArray(pool);
    }
    
    // 更新每张卡片是否被压住 (topMost 状态) 基于矩形重叠 + 图层层级
    function updateTopMostStatus(cardsList) {
        const active = cardsList.filter(c => !c.removed);
        for (let i = 0; i < active.length; i++) {
            active[i].topMost = true;
        }
        for (let i = 0; i < active.length; i++) {
            const cardA = active[i];
            for (let j = 0; j < active.length; j++) {
                if (i === j) continue;
                const cardB = active[j];
                // 若 B 的图层 > A 的图层 (B在更上层) 且 卡片矩形重叠，则 A 被压住
                if (cardB.layer > cardA.layer) {
                    const aLeft = cardA.x - cardA.width/2;
                    const aRight = cardA.x + cardA.width/2;
                    const aTop = cardA.y - cardA.height/2;
                    const aBottom = cardA.y + cardA.height/2;
                    const bLeft = cardB.x - cardB.width/2;
                    const bRight = cardB.x + cardB.width/2;
                    const bTop = cardB.y - cardB.height/2;
                    const bBottom = cardB.y + cardB.height/2;
                    if (aRight > bLeft && aLeft < bRight && aBottom > bTop && aTop < bBottom) {
                        cardA.topMost = false;
                        break;
                    }
                }
            }
        }
        // 将状态同步回原数组
        for (let card of cardsList) {
            if (!card.removed) {
                const found = active.find(a => a.id === card.id);
                if (found) card.topMost = found.topMost;
            }
        }
        return cardsList;
    }
    
    // 槽位消除逻辑 (递归消除三个相同)
    function eliminateFromSlot() {
        let anyElim = false;
        while (true) {
            const countMap = new Map();
            for (let icon of slotCards) {
                countMap.set(icon, (countMap.get(icon) || 0) + 1);
            }
            let targetIcon = null;
            for (let [icon, cnt] of countMap.entries()) {
                if (cnt >= 3) {
                    targetIcon = icon;
                    break;
                }
            }
            if (!targetIcon) break;
            let removed = 0;
            const newSlot = [];
            for (let icon of slotCards) {
                if (icon === targetIcon && removed < 3) {
                    removed++;
                    continue;
                }
                newSlot.push(icon);
            }
            slotCards = newSlot;
            score += 10;
            anyElim = true;
            gameMessageDiv.innerText = `✨ 消除三个 ${targetIcon}！ +10分 ✨`;
        }
        if (anyElim) {
            updateUI();
            checkVictoryAndFail();
        }
        return anyElim;
    }
    
    // 检查胜利 / 失败
    function checkVictoryAndFail() {
        const remainingCards = stackCards.filter(c => !c.removed).length;
        if (remainingCards === 0 && slotCards.length === 0 && gameActive) {
            gameActive = false;
            gameMessageDiv.innerText = '🎉 完美通关！ 羊了个羊大师！ 🎉';
            updateUI();
            return true;
        }
        // 失败判断: 槽位≥7且无三消可能
        if (slotCards.length >= 7 && gameActive) {
            const countMap = new Map();
            for (let icon of slotCards) countMap.set(icon, (countMap.get(icon)||0)+1);
            let canElim = false;
            for (let cnt of countMap.values()) if (cnt >= 3) { canElim = true; break; }
            if (!canElim) {
                gameActive = false;
                gameMessageDiv.innerText = '💥 槽位已满且无法消除... 游戏失败！点击重来 💥';
                updateUI();
                return true;
            }
        }
        return false;
    }
    
    // 点击卡片: 只有未被移除且 topMost === true 才能放入卡槽
    function onStackCardClick(cardId) {
        if (!gameActive) {
            gameMessageDiv.innerText = gameActive === false ? "游戏已结束，按重来继续" : "游戏结束";
            return;
        }
        const card = stackCards.find(c => c.id === cardId && !c.removed);
        if (!card) return;
        if (!card.topMost) {
            gameMessageDiv.innerText = '⛔ 这张牌被压住了！先点击上层的卡片';
            return;
        }
        // 放入卡槽
        slotCards.push(card.icon);
        card.removed = true;
        
        // 重新计算遮盖关系
        updateTopMostStatus(stackCards);
        updateUI();
        
        // 消除检测
        eliminateFromSlot();
        
        // 再次检查失败/胜利
        const isOver = checkVictoryAndFail();
        if (!isOver && gameActive) {
            gameMessageDiv.innerText = '✓ 继续消除，注意槽位上限7张';
        }
        updateUI();
    }
    
    // 洗牌: 仅重新打乱剩余未被移除卡片的图标顺序 (保留位置和图层)
    function shuffleRemainingIcons() {
        if (!gameActive) {
            gameMessageDiv.innerText = '游戏已结束，请重来';
            return;
        }
        const activeCards = stackCards.filter(c => !c.removed);
        if (activeCards.length === 0) {
            gameMessageDiv.innerText = '已经没有卡片了，太厉害了！';
            return;
        }
        const currentIcons = activeCards.map(c => c.icon);
        const shuffledIcons = shuffleArray([...currentIcons]);
        activeCards.forEach((card, idx) => {
            card.icon = shuffledIcons[idx];
        });
        updateUI();
        gameMessageDiv.innerText = '♻️ 剩余卡片已洗牌，继续挑战';
        // 洗牌后检查槽位消除
        eliminateFromSlot();
        checkVictoryAndFail();
        updateUI();
    }
    
    // 重置本局 (重新从当前关卡数据构建，随机分配新图标池)
    function resetGameFromLevel() {
        if (!currentLevelData) {
            gameMessageDiv.innerText = '关卡数据缺失，请刷新页面重试';
            return;
        }
        buildGameFromLevelData(currentLevelData);
    }
    
    // 根据关卡 JSON 构建游戏 (生成卡片 + 随机图标池)
    function buildGameFromLevelData(levelJson) {
        // 读取卡片位置信息
        const positions = levelJson.cards;
        if (!positions || positions.length === 0) {
            gameMessageDiv.innerText = '关卡错误: 没有卡片数据';
            return;
        }
        let totalCards = positions.length;
        // 确保总数为3的倍数 (若json导出时已保证，但再保险)
        if (totalCards % 3 !== 0) {
            const newTotal = Math.ceil(totalCards / 3) * 3;
            console.warn(`卡片数量${totalCards}不是3倍数，将使用前${newTotal}张，请检查设计器`);
            totalCards = newTotal;
        }
        // 生成图标池 (随机分配，每个图标次数为3倍数)
        const freshIconPool = generateIconPool(totalCards);
        if (freshIconPool.length !== positions.length) {
            console.error("图标池数量不匹配");
        }
        // 构建卡片对象
        const newCards = [];
        for (let i = 0; i < positions.length; i++) {
            const pos = positions[i];
            // 兼容字段: 设计器导出格式中包含 x, y, layer ，可能含有 width/height 或使用默认值
            const cardWidth = levelJson.cardSize || 70;
            const cardHeight = levelJson.cardSize || 70;
            newCards.push({
                id: nextCardId++,
                icon: freshIconPool[i % freshIconPool.length],
                x: pos.x,
                y: pos.y,
                layer: pos.layer !== undefined ? pos.layer : 0,
                width: cardWidth,
                height: cardHeight,
                topMost: true,
                removed: false
            });
        }
        stackCards = newCards;
        // 重新计算遮盖
        updateTopMostStatus(stackCards);
        slotCards = [];
        score = 0;
        gameActive = true;
        updateUI();
        gameMessageDiv.innerText = `🎲 关卡加载成功！共${stackCards.length}张卡片，3的倍数✅ 点击顶层卡片开始消除`;
    }
    
    // 更新整个 UI (槽位 + 堆叠卡片 + 分数/剩余)
    function updateUI() {
        // 更新分数和剩余牌数
        scoreSpan.innerText = score;
        const remaining = stackCards.filter(c => !c.removed).length;
        remainingSpan.innerText = remaining;
        
        // 渲染堆叠区域 (根据绝对坐标定位)
        cardsStackDiv.innerHTML = '';
        const activeCards = stackCards.filter(c => !c.removed);
        // 获取容器居中参考
        const containerRect = cardsStackDiv.getBoundingClientRect();
        const centerX = cardsStackDiv.clientWidth / 2;
        const centerY = cardsStackDiv.clientHeight / 2;
        // 为了保持相对坐标, 设计器中的坐标一般是基于画布坐标系(0~720) 需要映射到实际容器中心
        // 但我们存储的 x,y 是设计器原始坐标(例如 200,180)，所以需要偏移转换使它们展示在容器中央。
        // 简便方法: 计算设计器中所有卡片的最小/最大范围，将其居中显示。但为了保持布局一致，使用平均偏移。
        // 更稳健: 计算所有卡片的平均中心，平移到容器中心。
        if (activeCards.length > 0) {
            let sumX = 0, sumY = 0;
            for (let c of activeCards) {
                sumX += c.x;
                sumY += c.y;
            }
            const avgX = sumX / activeCards.length;
            const avgY = sumY / activeCards.length;
            // 偏移量使得平均点移到容器中心
            const offsetX = centerX - avgX;
            const offsetY = centerY - avgY;
            for (let card of activeCards) {
                const cardDiv = document.createElement('div');
                cardDiv.className = 'stack-card';
                if (!card.topMost) cardDiv.classList.add('disabled-card');
                const leftPos = card.x + offsetX - card.width/2;
                const topPos = card.y + offsetY - card.height/2;
                cardDiv.style.position = 'absolute';
                cardDiv.style.left = `${leftPos}px`;
                cardDiv.style.top = `${topPos}px`;
                cardDiv.style.width = `${card.width}px`;
                cardDiv.style.height = `${card.height}px`;
                cardDiv.style.zIndex = card.layer * 10 + (card.topMost ? 100 : 1);
                cardDiv.innerText = card.icon;
                cardDiv.addEventListener('click', (e) => {
                    e.stopPropagation();
                    onStackCardClick(card.id);
                });
                cardsStackDiv.appendChild(cardDiv);
            }
        }
        
        // 渲染槽位: 固定七个槽位完整显示
        slotContainer.innerHTML = '';
        for (let i = 0; i < slotCards.length; i++) {
            const slotDiv = document.createElement('div');
            slotDiv.className = 'slot-card';
            if (slotCards.length >= 7) slotDiv.classList.add('warning');
            slotDiv.innerText = slotCards[i];
            slotContainer.appendChild(slotDiv);
        }
        // 补齐至7个槽位占位
        for (let i = slotCards.length; i < 7; i++) {
            const emptyDiv = document.createElement('div');
            emptyDiv.className = 'slot-card';
            emptyDiv.style.background = '#eeddbb';
            emptyDiv.style.boxShadow = 'inset 0 0 0 1px #bba46c';
            emptyDiv.style.opacity = '0.55';
            emptyDiv.innerText = '?';
            slotContainer.appendChild(emptyDiv);
        }
    }
    
    // 加载 JSON 文件
    async function loadLevelFile() {
        gameMessageDiv.innerText = `📂 正在读取关卡文件 "${LEVEL_FILE_NAME}" ...`;
        try {
            const response = await fetch(LEVEL_FILE_NAME);
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}: 文件不存在或无法访问`);
            }
            const levelData = await response.json();
            // 校验必要字段
            if (!levelData.cards || !Array.isArray(levelData.cards) || levelData.cards.length === 0) {
                throw new Error("关卡文件格式错误: 缺少 cards 数组");
            }
            currentLevelData = levelData;
            // 提取卡片尺寸设定
            const cardSize = levelData.cardSize || 70;
            // 可选: 同步全局卡片默认尺寸，但每个卡片独立坐标优先
            buildGameFromLevelData(levelData);
            gameMessageDiv.innerText = `✅ 关卡加载成功！${stackCards.length}张卡片 (3的倍数已保证) 点击堆叠卡片开始游戏`;
        } catch (err) {
            console.error(err);
            gameMessageDiv.innerText = `❌ 加载失败: ${err.message} 请确认 "${LEVEL_FILE_NAME}" 文件与页面在同目录下`;
            cardsStackDiv.innerHTML = `<div style="text-align:center; padding:60px; color:#4a2e1a;">⚠️ 无法加载关卡文件<br>请检查文件路径: ${LEVEL_FILE_NAME}</div>`;
        }
    }
    
    // 按钮事件
    resetBtn.addEventListener('click', () => {
        if (currentLevelData) {
            resetGameFromLevel();
        } else {
            loadLevelFile();
        }
    });
    shuffleBtn.addEventListener('click', () => {
        if (!gameActive) {
            gameMessageDiv.innerText = '游戏已结束，请按重来开始新对局';
            return;
        }
        shuffleRemainingIcons();
    });
    
    // 启动游戏
    loadLevelFile();
</script>
</body>
</html>
