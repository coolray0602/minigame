<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>羊了個羊 · 完美七卡槽 | 稳定堆叠</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #1b5e2a 0%, #0a3b1a 100%);
            font-family: 'Segoe UI', 'Poppins', 'Noto Sans TC', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: manipulation;
            padding: 12px;
        }

        /* 游戏主容器 */
        .game-container {
            width: 100%;
            max-width: 560px;
            margin: 0 auto;
            background: rgba(255,248,205,0.88);
            border-radius: 64px 64px 56px 56px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5), inset 0 1px 4px rgba(255,255,200,0.8);
            backdrop-filter: blur(3px);
            padding: 18px 12px 24px;
            transition: all 0.2s;
        }

        /* 顶部状态栏 */
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            background: #fdf8e7;
            padding: 10px 18px;
            border-radius: 60px;
            margin-bottom: 18px;
            box-shadow: inset 0 1px 4px #0001, 0 6px 12px rgba(0,0,0,0.2);
        }

        .score-box, .remaining-box {
            background: #2c2b28;
            padding: 6px 18px;
            border-radius: 40px;
            color: #ffeaac;
            font-weight: bold;
            font-size: 1.2rem;
            text-shadow: 0 1px 0 #5f3f00;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .score-box span, .remaining-box span {
            font-size: 0.7rem;
            color: #ddb76e;
            margin-right: 6px;
        }

        /* 卡槽区 - 使用 grid + 百分比 确保7个完整显示无滚动条 */
        .slot-area {
            background: #e7dbb6;
            border-radius: 48px;
            padding: 12px 10px;
            margin-bottom: 20px;
            box-shadow: inset 0 0 0 3px #fff9e8, inset 0 0 0 6px #b9975a, 0 8px 18px black;
        }

        .slot-header {
            text-align: center;
            margin-bottom: 8px;
        }
        .slot-title {
            font-size: 0.7rem;
            font-weight: bold;
            color: #7a5610;
            background: #fffaec;
            display: inline-block;
            padding: 4px 18px;
            border-radius: 30px;
        }

        /* 关键：使用网格布局 + 自动等宽，强制7列，不换行，无滚动条 */
        .slots {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            width: 100%;
            padding: 6px 2px;
        }

        .slot-card {
            aspect-ratio: 3 / 4;
            width: 100%;
            background: #fef1ca;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(1.2rem, 6vw, 2rem);
            font-weight: bold;
            box-shadow: 0 5px 0 #aa7c3c;
            transition: all 0.1s ease;
            background: #fff3df;
            border: 1px solid #ecc48b;
        }

        .slot-card.warning {
            background: #ffb4a2;
            box-shadow: 0 0 0 2px #ff4444;
            transform: scale(0.98);
        }

        /* 堆叠舞台 - 固定位置，卡片绝对定位不抖动 */
        .stack-stage {
            background: #ccaa75;
            border-radius: 48px;
            padding: 16px 12px;
            margin: 12px 0;
            box-shadow: inset 0 0 0 3px #fef0cf, inset 0 0 0 6px #b47c44, 0 8px 14px black;
            min-height: 420px;
            position: relative;
            overflow: visible;
        }

        .cards-stack {
            position: relative;
            width: 100%;
            min-height: 400px;
            transform-style: preserve-3d;
        }

        /* 堆叠卡片 - 使用 transform 代替 left/top 重绘优化，避免位移抖动 */
        .stack-card {
            position: absolute;
            width: 70px;
            height: 70px;
            background: #fff7e8;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.9rem;
            font-weight: bold;
            box-shadow: 0 6px 0 #a86f2e, 0 3px 10px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: transform 0.05s ease, box-shadow 0.05s ease;
            transform-origin: center;
            border: 1px solid #fce6b4;
            z-index: 10;
            will-change: transform;
            backface-visibility: hidden;
        }

        .stack-card:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #a86f2e;
        }

        .stack-card.disabled-card {
            filter: brightness(0.7);
            cursor: default;
            pointer-events: none;
        }

        .control-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 16px;
        }

        button {
            background: #ffdd99;
            border: none;
            font-size: 1rem;
            font-weight: bold;
            padding: 8px 24px;
            border-radius: 60px;
            color: #4f2d0a;
            box-shadow: 0 4px 0 #b16224;
            transition: 0.07s linear;
            cursor: pointer;
            font-family: inherit;
        }

        button:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #b16224;
        }

        .message-area {
            text-align: center;
            margin-top: 16px;
            font-size: 0.8rem;
            font-weight: bold;
            background: #2b2b1faa;
            backdrop-filter: blur(4px);
            border-radius: 40px;
            padding: 8px;
            color: #ffefb9;
        }

        /* 手机自适应 - 卡槽使用网格无需滚动条，卡片尺寸自动缩小 */
        @media (max-width: 550px) {
            .stack-card {
                width: clamp(52px, 13vw, 70px);
                height: clamp(52px, 13vw, 70px);
                font-size: clamp(1.3rem, 5vw, 1.9rem);
            }
            .game-container {
                padding: 14px 10px 20px;
            }
            .score-box, .remaining-box {
                padding: 4px 12px;
                font-size: 1rem;
            }
            .slot-card {
                box-shadow: 0 3px 0 #aa7c3c;
            }
        }

        @media (max-width: 450px) {
            .stack-card {
                width: 48px;
                height: 48px;
                font-size: 1.3rem;
                box-shadow: 0 4px 0 #a86f2e;
            }
            .slot-card {
                font-size: 1rem;
            }
            .slots {
                gap: 4px;
            }
        }
        
        /* 加载提示 */
        .loading-overlay {
            text-align: center;
            padding: 40px;
            background: #fdf0cf;
            border-radius: 48px;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="game-container" id="gameContainer">
    <div class="game-header">
        <div class="score-box"><span>🐏 积分</span> <span id="scoreValue">0</span></div>
        <div class="remaining-box"><span>📦 剩余</span> <span id="remainingCount">0</span></div>
    </div>

    <div class="slot-area">
        <div class="slot-header"><span class="slot-title">📥 卡槽 (最多7张)</span></div>
        <div class="slots" id="slotContainer"></div>
    </div>

    <div class="stack-stage">
        <div class="cards-stack" id="cardsStack"></div>
    </div>

    <div class="control-bar">
        <button id="resetBtn">🔄 重来</button>
        <button id="shuffleBtn">♻️ 洗牌</button>
    </div>
    <div class="message-area" id="gameMessage">📂 正在加载关卡配置 level.json ...</div>
</div>

<script>
    // --------------------------------------------------------------
    // 羊了个羊 · 游戏主体 (稳定版)
    // 修复: 1. 卡片点击后其他卡片不再位移 (使用 transform + 预计算偏移)
    //       2. 七卡槽使用 grid 布局，任何宽度下完整显示无滚动条
    //       3. 卡片位置由初始偏移量固定，移除重新布局逻辑
    // --------------------------------------------------------------
    
    // ========== 可配置项：请在此填入您的关卡文件名 ==========
    const LEVEL_FILE_NAME = "level.json";   // 同目录下的关卡配置文件
    
    // 全局游戏状态
    let gameActive = true;
    let score = 0;
    let slotCards = [];            // 槽位图标数组
    let stackCards = [];           // 堆叠卡片对象数组
    let nextCardId = 1;
    let currentLevelData = null;
    
    // 存储原始卡片位置偏移 (用于稳定渲染，防止位移)
    let cardPositionsCache = new Map(); // key: card.id, value: { leftPx, topPx, width, height }
    
    // 图标库
    const ICON_LIBRARY = ['🌿', '🍂', '🔥', '💧', '⭐', '❤️', '🍎', '🐑', '🌸', '🌻', '🍀', '🪶', '🧸', '🎈', '🍁', '🌟', '🌀', '🎵'];
    
    // DOM 元素
    const cardsStackDiv = document.getElementById('cardsStack');
    const slotContainer = document.getElementById('slotContainer');
    const scoreSpan = document.getElementById('scoreValue');
    const remainingSpan = document.getElementById('remainingCount');
    const resetBtn = document.getElementById('resetBtn');
    const shuffleBtn = document.getElementById('shuffleBtn');
    const gameMessageDiv = document.getElementById('gameMessage');
    
    // 辅助函数
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }
    
    // 根据卡片总数生成图标池 (每个图标出现次数为3的倍数)
    function generateIconPool(totalCards) {
        if (totalCards % 3 !== 0) {
            console.warn("卡片总数不是3的倍数，强制调整");
            totalCards = Math.ceil(totalCards / 3) * 3;
        }
        let pool = [];
        let iconIdx = 0;
        while (pool.length < totalCards) {
            const icon = ICON_LIBRARY[iconIdx % ICON_LIBRARY.length];
            for (let i = 0; i < 3 && pool.length < totalCards; i++) {
                pool.push(icon);
            }
            iconIdx++;
        }
        if (pool.length > totalCards) pool = pool.slice(0, totalCards);
        return shuffleArray(pool);
    }
    
    // 更新每张卡片是否被压住 (topMost 状态) - 纯逻辑不触发重绘位移
    function updateTopMostStatus(cardsList) {
        const active = cardsList.filter(c => !c.removed);
        for (let i = 0; i < active.length; i++) {
            active[i].topMost = true;
        }
        for (let i = 0; i < active.length; i++) {
            const cardA = active[i];
            for (let j = 0; j < active.length; j++) {
                if (i === j) continue;
                const cardB = active[j];
                if (cardB.layer > cardA.layer) {
                    const aLeft = cardA.x - cardA.width/2;
                    const aRight = cardA.x + cardA.width/2;
                    const aTop = cardA.y - cardA.height/2;
                    const aBottom = cardA.y + cardA.height/2;
                    const bLeft = cardB.x - cardB.width/2;
                    const bRight = cardB.x + cardB.width/2;
                    const bTop = cardB.y - cardB.height/2;
                    const bBottom = cardB.y + cardB.height/2;
                    if (aRight > bLeft && aLeft < bRight && aBottom > bTop && aTop < bBottom) {
                        cardA.topMost = false;
                        break;
                    }
                }
            }
        }
        for (let card of cardsList) {
            if (!card.removed) {
                const found = active.find(a => a.id === card.id);
                if (found) card.topMost = found.topMost;
            }
        }
        return cardsList;
    }
    
    // 槽位消除逻辑
    function eliminateFromSlot() {
        let anyElim = false;
        while (true) {
            const countMap = new Map();
            for (let icon of slotCards) {
                countMap.set(icon, (countMap.get(icon) || 0) + 1);
            }
            let targetIcon = null;
            for (let [icon, cnt] of countMap.entries()) {
                if (cnt >= 3) {
                    targetIcon = icon;
                    break;
                }
            }
            if (!targetIcon) break;
            let removed = 0;
            const newSlot = [];
            for (let icon of slotCards) {
                if (icon === targetIcon && removed < 3) {
                    removed++;
                    continue;
                }
                newSlot.push(icon);
            }
            slotCards = newSlot;
            score += 10;
            anyElim = true;
            gameMessageDiv.innerText = `✨ 消除三个 ${targetIcon}！ +10分 ✨`;
        }
        if (anyElim) {
            renderSlotsOnly();   // 只刷新槽位和分数
            checkVictoryAndFail();
        }
        return anyElim;
    }
    
    function checkVictoryAndFail() {
        const remainingCards = stackCards.filter(c => !c.removed).length;
        if (remainingCards === 0 && slotCards.length === 0 && gameActive) {
            gameActive = false;
            gameMessageDiv.innerText = '🎉 完美通关！ 羊了个羊大师！ 🎉';
            updateStatsUI();
            return true;
        }
        if (slotCards.length >= 7 && gameActive) {
            const countMap = new Map();
            for (let icon of slotCards) countMap.set(icon, (countMap.get(icon)||0)+1);
            let canElim = false;
            for (let cnt of countMap.values()) if (cnt >= 3) { canElim = true; break; }
            if (!canElim) {
                gameActive = false;
                gameMessageDiv.innerText = '💥 槽位已满且无法消除... 游戏失败！点击重来 💥';
                updateStatsUI();
                renderSlotsOnly();
                return true;
            }
        }
        return false;
    }
    
    // 点击卡片逻辑
    function onStackCardClick(cardId) {
        if (!gameActive) {
            gameMessageDiv.innerText = gameActive === false ? "游戏已结束，按重来继续" : "游戏结束";
            return;
        }
        const card = stackCards.find(c => c.id === cardId && !c.removed);
        if (!card) return;
        if (!card.topMost) {
            gameMessageDiv.innerText = '⛔ 这张牌被压住了！先点击上层的卡片';
            return;
        }
        // 放入卡槽
        slotCards.push(card.icon);
        card.removed = true;
        
        // 重新计算遮盖关系 (不重新渲染位置，只更新 topMost 状态)
        updateTopMostStatus(stackCards);
        
        // 只刷新卡片可见性和样式 (不重新定位)
        refreshCardsVisibilityAndState();
        renderSlotsOnly();
        updateStatsUI();
        
        // 消除检测
        eliminateFromSlot();
        checkVictoryAndFail();
        
        if (gameActive) {
            gameMessageDiv.innerText = '✓ 继续消除，注意槽位上限7张';
        }
        updateStatsUI();
    }
    
    // 只刷新卡片的可见性和禁用状态 (不改变位置，避免位移)
    function refreshCardsVisibilityAndState() {
        const allCardElements = document.querySelectorAll('.stack-card');
        // 创建 id 到卡片对象的映射
        const cardMap = new Map();
        stackCards.forEach(c => { if (!c.removed) cardMap.set(c.id, c); });
        
        allCardElements.forEach(el => {
            const cardId = parseInt(el.getAttribute('data-card-id'));
            const cardData = cardMap.get(cardId);
            if (!cardData) {
                // 卡片已被移除，隐藏
                el.style.display = 'none';
            } else {
                el.style.display = 'flex';
                if (!cardData.topMost) {
                    el.classList.add('disabled-card');
                } else {
                    el.classList.remove('disabled-card');
                }
            }
        });
    }
    
    // 仅刷新槽位 UI 和分数/剩余统计 (不重建堆叠)
    function renderSlotsOnly() {
        // 更新分数显示
        scoreSpan.innerText = score;
        const remaining = stackCards.filter(c => !c.removed).length;
        remainingSpan.innerText = remaining;
        
        // 渲染槽位 (grid 布局，始终7格)
        slotContainer.innerHTML = '';
        for (let i = 0; i < slotCards.length; i++) {
            const slotDiv = document.createElement('div');
            slotDiv.className = 'slot-card';
            if (slotCards.length >= 7) slotDiv.classList.add('warning');
            slotDiv.innerText = slotCards[i];
            slotContainer.appendChild(slotDiv);
        }
        // 补齐至7个槽位
        for (let i = slotCards.length; i < 7; i++) {
            const emptyDiv = document.createElement('div');
            emptyDiv.className = 'slot-card';
            emptyDiv.style.background = '#eeddbb';
            emptyDiv.style.boxShadow = 'inset 0 0 0 1px #bba46c';
            emptyDiv.style.opacity = '0.55';
            emptyDiv.innerText = '?';
            slotContainer.appendChild(emptyDiv);
        }
    }
    
    function updateStatsUI() {
        scoreSpan.innerText = score;
        const remaining = stackCards.filter(c => !c.removed).length;
        remainingSpan.innerText = remaining;
    }
    
    // 洗牌: 只重新打乱剩余卡片图标，不改变位置
    function shuffleRemainingIcons() {
        if (!gameActive) {
            gameMessageDiv.innerText = '游戏已结束，请重来';
            return;
        }
        const activeCards = stackCards.filter(c => !c.removed);
        if (activeCards.length === 0) {
            gameMessageDiv.innerText = '已经没有卡片了！';
            return;
        }
        const currentIcons = activeCards.map(c => c.icon);
        const shuffledIcons = shuffleArray([...currentIcons]);
        activeCards.forEach((card, idx) => {
            card.icon = shuffledIcons[idx];
        });
        // 更新卡片显示的文字
        const allCardElements = document.querySelectorAll('.stack-card');
        allCardElements.forEach(el => {
            const cardId = parseInt(el.getAttribute('data-card-id'));
            const card = stackCards.find(c => c.id === cardId && !c.removed);
            if (card) {
                el.innerText = card.icon;
            }
        });
        gameMessageDiv.innerText = '♻️ 剩余卡片已洗牌，继续挑战';
        eliminateFromSlot();
        checkVictoryAndFail();
        updateStatsUI();
    }
    
    // 构建堆叠卡片 DOM (一次性生成，固定位置)
    function buildStackDOM() {
        cardsStackDiv.innerHTML = '';
        if (!stackCards.length) return;
        
        // 获取容器尺寸用于计算偏移
        const containerRect = cardsStackDiv.getBoundingClientRect();
        const containerCenterX = cardsStackDiv.clientWidth / 2;
        const containerCenterY = cardsStackDiv.clientHeight / 2;
        
        // 计算所有未移除卡片的平均中心，用于偏移校准
        const activeCards = stackCards.filter(c => !c.removed);
        if (activeCards.length === 0) return;
        
        let sumX = 0, sumY = 0;
        activeCards.forEach(c => { sumX += c.x; sumY += c.y; });
        const avgX = sumX / activeCards.length;
        const avgY = sumY / activeCards.length;
        const offsetX = containerCenterX - avgX;
        const offsetY = containerCenterY - avgY;
        
        // 生成所有卡片（包括已移除的，但移除的会隐藏）
        stackCards.forEach(card => {
            const cardDiv = document.createElement('div');
            cardDiv.className = 'stack-card';
            if (card.removed) {
                cardDiv.style.display = 'none';
            }
            if (!card.topMost && !card.removed) {
                cardDiv.classList.add('disabled-card');
            }
            cardDiv.setAttribute('data-card-id', card.id);
            cardDiv.innerText = card.icon;
            
            const leftPos = card.x + offsetX - card.width/2;
            const topPos = card.y + offsetY - card.height/2;
            cardDiv.style.position = 'absolute';
            cardDiv.style.left = `${leftPos}px`;
            cardDiv.style.top = `${topPos}px`;
            cardDiv.style.width = `${card.width}px`;
            cardDiv.style.height = `${card.height}px`;
            cardDiv.style.zIndex = card.layer * 10 + (card.topMost ? 100 : 1);
            
            cardDiv.addEventListener('click', (e) => {
                e.stopPropagation();
                onStackCardClick(card.id);
            });
            cardsStackDiv.appendChild(cardDiv);
        });
    }
    
    // 重置游戏 (从当前关卡数据重新构建)
    function resetGameFromLevel() {
        if (!currentLevelData) {
            gameMessageDiv.innerText = '关卡数据缺失，请刷新页面重试';
            return;
        }
        buildGameFromLevelData(currentLevelData);
    }
    
    // 根据关卡 JSON 构建游戏 (生成卡片 + 随机图标池)
    function buildGameFromLevelData(levelJson) {
        const positions = levelJson.cards;
        if (!positions || positions.length === 0) {
            gameMessageDiv.innerText = '关卡错误: 没有卡片数据';
            return;
        }
        let totalCards = positions.length;
        if (totalCards % 3 !== 0) {
            const newTotal = Math.ceil(totalCards / 3) * 3;
            console.warn(`卡片数量${totalCards}不是3倍数，将使用前${newTotal}张`);
            totalCards = newTotal;
        }
        const freshIconPool = generateIconPool(totalCards);
        // 构建卡片对象
        const newCards = [];
        for (let i = 0; i < positions.length; i++) {
            const pos = positions[i];
            const cardWidth = levelJson.cardSize || 70;
            const cardHeight = levelJson.cardSize || 70;
            newCards.push({
                id: nextCardId++,
                icon: freshIconPool[i % freshIconPool.length],
                x: pos.x,
                y: pos.y,
                layer: pos.layer !== undefined ? pos.layer : 0,
                width: cardWidth,
                height: cardHeight,
                topMost: true,
                removed: false
            });
        }
        stackCards = newCards;
        updateTopMostStatus(stackCards);
        slotCards = [];
        score = 0;
        gameActive = true;
        
        // 重建 DOM 固定位置
        buildStackDOM();
        renderSlotsOnly();
        gameMessageDiv.innerText = `✅ 关卡加载成功！共${stackCards.length}张卡片 (3的倍数) 点击顶层卡片开始消除`;
    }
    
    // 加载 JSON 文件
    async function loadLevelFile() {
        gameMessageDiv.innerText = `📂 正在读取关卡文件 "${LEVEL_FILE_NAME}" ...`;
        try {
            const response = await fetch(LEVEL_FILE_NAME);
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}: 文件不存在或无法访问`);
            }
            const levelData = await response.json();
            if (!levelData.cards || !Array.isArray(levelData.cards) || levelData.cards.length === 0) {
                throw new Error("关卡文件格式错误: 缺少 cards 数组");
            }
            currentLevelData = levelData;
            buildGameFromLevelData(levelData);
        } catch (err) {
            console.error(err);
            gameMessageDiv.innerText = `❌ 加载失败: ${err.message} 请确认 "${LEVEL_FILE_NAME}" 文件与页面在同目录下`;
            cardsStackDiv.innerHTML = `<div style="text-align:center; padding:60px; color:#4a2e1a;">⚠️ 无法加载关卡文件<br>请检查文件路径: ${LEVEL_FILE_NAME}</div>`;
        }
    }
    
    // 重置按钮事件
    resetBtn.addEventListener('click', () => {
        if (currentLevelData) {
            resetGameFromLevel();
        } else {
            loadLevelFile();
        }
    });
    
    shuffleBtn.addEventListener('click', () => {
        if (!gameActive) {
            gameMessageDiv.innerText = '游戏已结束，请按重来开始新对局';
            return;
        }
        shuffleRemainingIcons();
    });
    
    // 启动游戏
    loadLevelFile();
    
    // 监听窗口大小变化时，重新计算卡片位置 (防止变形但保持相对位置不变)
    let resizeTimer;
    window.addEventListener('resize', () => {
        if (resizeTimer) clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => {
            if (stackCards.length > 0 && currentLevelData) {
                // 重建DOM以重新计算偏移
                buildStackDOM();
                refreshCardsVisibilityAndState();
            }
        }, 150);
    });
</script>
</body>
</html>
